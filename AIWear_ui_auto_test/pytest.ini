[pytest]
;--alluredir=report/allure-results --clean-alluredir
addopts = -vs --alluredir=report/allure-results --clean-alluredir
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    order: 用 pytest-order 控制执行顺序
    smoke: 核心主流程用例
    manual: 依赖人工或外部条件的用例
    unstable: 依赖后端异步结果的用例
