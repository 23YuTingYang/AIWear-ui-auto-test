    name: "文搜图页面-使用可命中查询词搜索后展示结果列表"
    query: "短袖"
    markers: ["unstable"]
  - id: "text_search_placeholder"
    name: "文搜图页面-搜索输入框显示正确占位文案"
  - id: "text_search_tab_highlight"
    name: "文搜图页面-切换到文搜图标签后标签高亮正确"
