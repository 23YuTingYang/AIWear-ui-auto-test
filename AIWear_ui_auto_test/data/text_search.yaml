    name: "文搜图页面-无结果时显示默认空态文案"
    query: "无匹配素材查询词"
    markers: ["unstable"]
  - id: "text_search_menu_highlight"
    name: "文搜图页面-左侧菜单保持我的图片高亮"
  - id: "text_search_user_dropdown"
    name: "文搜图页面-右上角用户下拉菜单可以展开"
