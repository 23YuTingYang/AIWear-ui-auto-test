cases:
  - id: "login_code_success"
    name: "登录页面-验证码登录成功并跳转到图片编辑页"
    login_type: "code"
    email: "your_email@example.com"
    expect_url: "/edit"
    expect_title: "图片编辑"
    expect_username: "your_display_name"
  - id: "login_password_success"
    name: "登录页面-账号密码登录成功并跳转到图片编辑页"
    login_type: "password"
    username: "your_username"
    password: "your_password"
    expect_url: "/edit"
    expect_title: "图片编辑"
    expect_username: "your_display_name"
    markers: ["smoke"]
  - id: "login_invalid_code"
    name: "登录页面-正确邮箱加错误验证码登录失败"
    login_type: "code"
    email: "your_email@example.com"
    code: "111111"
    expect_error: "验证码不存在或已过期"
  - id: "login_invalid_password"
    name: "登录页面-正确账号加错误密码登录失败"
    login_type: "password"
    username: "your_username"
    password: "wrong_password"
    expect_error: "用户名或密码错误"
  - id: "login_invalid_email_format"
    name: "登录页面-邮箱格式错误时不能作为验证码发送前置条件"
    login_type: "code"
    email: "invalid_email"
    expect_not_text: "验证码已发送"
  - id: "login_refresh_keeps_session"
    name: "登录页面-登录成功后刷新仍保持登录态"
    login_type: "password"
    username: "your_username"
    password: "your_password"
    expect_url: "/edit"
    expect_title: "图片编辑"
  - id: "logout_redirects_to_login"
    name: "登录页面-退出登录后访问受保护页面跳回登录页"
    login_type: "password"
    username: "your_username"
    password: "your_password"
    protected_path: "/edit"
  - id: "login_default_code_form"
    name: "登录页面-默认显示验证码登录表单"
  - id: "login_switch_to_password_form"
    name: "登录页面-切换到密码登录后表单显示正确"
